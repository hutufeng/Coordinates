<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="专业RTK坐标计算工具 - 道路设计、放样计算、坐标转换">
  <meta name="theme-color" content="#0B1629">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="坐标计算">
  <title>坐标计算 | 专业RTK工具</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <div class="app-loading">
      <div class="spinner"></div>
      <span>正在初始化...</span>
    </div>
  </div>

  <!-- CDN 依赖 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.13/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>

  <!-- 应用模块（顺序重要） -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/store.js"></script>
  <script src="js/core/geodesy.js"></script>
  <script src="js/core/RoadMath.js"></script>
  <script src="js/core/DxfExporter.js"></script>
  <script src="js/views/modules/PointLib.js"></script>
  <script src="js/views/modules/CoordCalc.js"></script>
  <script src="js/views/modules/CoordConv.js"></script>
  <script src="js/views/modules/LineLib.js"></script>
  <script src="js/views/modules/PolyLib.js"></script>
  <script src="js/views/modules/RoadLib.js"></script>
  <script src="js/views/modules/StakeoutLib.js"></script>

  <script src="js/views/Auth.js"></script>
  <script src="js/views/Dashboard.js"></script>
  <script src="js/views/UserManagement.js"></script>
  <script src="js/views/ProjectDetail.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker 注册 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('[SW] 已注册'))
          .catch(err => console.warn('[SW] 注册失败:', err));
      });
    }
  </script>
</body>
</html>
